name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    name: Gerar APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' 
          distribution: 'temurin'

      # Aqui está o segredo: usamos 'gradle' em vez de './gradlew'
      # Isso ignora totalmente o arquivo corrompido do AI Studio
      - name: Construir o APK
        run: gradle assembleDebug

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: aplicativo-pronto
          path: '**/*.apk'
